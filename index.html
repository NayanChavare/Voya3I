<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SDG-INSIGHT | Digital Assessment Framework</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@19.0.0",
          "react-dom": "https://esm.sh/react-dom@19.0.0",
          "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
          "lucide-react": "https://esm.sh/lucide-react@0.460.0?external=react",
          "recharts": "https://esm.sh/recharts@2.13.3?external=react,react-dom"
        }
      }
    </script>
    <style>
      body { 
        font-family: 'Inter', sans-serif; 
        scroll-behavior: smooth; 
        -webkit-font-smoothing: antialiased;
      }
      .custom-scrollbar::-webkit-scrollbar { width: 6px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
      
      @keyframes slide-up {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-slide-up { animation: slide-up 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
      
      .glass {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }
      
      .sdg-gradient {
        background: linear-gradient(135deg, #10b981 0%, #3b82f6 100%);
      }
    </style>
  <link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-[#F8FAFC] text-slate-900 custom-scrollbar">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
      import React, { useState, useEffect, useMemo } from 'react';
      import { createRoot } from 'react-dom/client';
      import { 
        Layout, ClipboardCheck, LayoutDashboard, LogOut, Home, 
        Globe, Users, BarChart3, ShieldCheck, ArrowRight, 
        GraduationCap, Briefcase, ChevronRight, 
        ChevronLeft, CheckCircle2, Trophy, Target, Lightbulb, 
        Users2, Download, Share2, Rocket, Presentation as PresentationIcon,
        BookOpen, Settings, CheckCircle, Info, Sparkles, AlertCircle
      } from 'lucide-react';
      import { 
        Radar, RadarChart, PolarGrid, PolarAngleAxis, 
        ResponsiveContainer, BarChart, Bar, XAxis, YAxis, 
        CartesianGrid, Tooltip, Cell
      } from 'recharts';

      // --- CONFIGURATION & CONSTANTS ---
      const DEPARTMENTS = [
        'Computer Science', 'Environmental Science', 'Business Administration',
        'Social Sciences', 'Mechanical Engineering', 'Medicine', 'Arts & Humanities', 'Law'
      ];

      const QUESTIONS = [
        { id: 1, text: "What is the primary target year for achieving the United Nations SDGs?", type: 'knowledge', options: ["2025", "2030", "2045", "2050"], correctAnswer: "2030" },
        { id: 2, text: "How many distinct Sustainable Development Goals comprise the 2030 Agenda?", type: 'knowledge', options: ["12", "15", "17", "21"], correctAnswer: "17" },
        { id: 3, text: "Which SDG specifically targets 'Quality Education'?", type: 'knowledge', options: ["SDG 1", "SDG 4", "SDG 8", "SDG 13"], correctAnswer: "SDG 4" },
        { id: 4, text: "To what extent do you integrate sustainable waste management into your daily campus life?", type: 'engagement', options: ["Daily/Frequently", "Occasionally", "Rarely", "Never"] },
        { id: 5, text: "Higher Education Institutions (HEIs) are the most critical drivers of global SDG success.", type: 'attitude', options: ["Strongly Agree", "Agree", "Neutral", "Disagree"] },
        { id: 6, text: "How often do you participate in sustainability-themed discussions or workshops?", type: 'engagement', options: ["Frequently", "Occasionally", "Rarely", "Never"] },
        { id: 7, text: "Have you observed SDG-related digital signage or posters on campus this semester?", type: 'exposure', options: ["Yes, frequently", "Yes, once or twice", "No", "Not sure"] },
        { id: 8, text: "I feel personally empowered to influence institutional sustainability policies.", type: 'attitude', options: ["Strongly Agree", "Agree", "Neutral", "Disagree"] }
      ];

      // --- STRATEGY ENGINE ---
      const getStrategicRecommendations = (scores, role) => {
        const actions = [];
        let summary = "";
        let trajectory = "";

        if (scores.knowledge < 15) {
          actions.push("Enroll in the 'SDG Foundations' open-access course.");
          actions.push("Subscribe to the Institutional Sustainability Newsletter.");
        } else {
          actions.push("Author a briefing paper on SDG integration for your department.");
          actions.push("Apply for the 'SDG Student Ambassador' leadership role.");
        }

        if (scores.engagement < 15) {
          actions.push("Participate in the upcoming campus-wide 'Green Audit'.");
          actions.push("Join a local SDG Action Group to move from theory to practice.");
        } else {
          actions.push("Lead a cross-disciplinary project focused on SDG 17 (Partnerships).");
          actions.push("Mentor junior members on sustainability best practices.");
        }

        if (scores.total < 50) {
          summary = "Awareness profile is at the 'Emergent' stage. Focus on foundational literacy and building a baseline understanding of the 2030 Agenda.";
          trajectory = `Transition to a certified 'Institutional SDG Advocate' by 2026.`;
        } else if (scores.total < 80) {
          summary = "A 'Developing' awareness profile suggests you have strong theoretical knowledge. The focus should now shift to active participation and behavioral change.";
          trajectory = "Leadership role within the Institutional Sustainability Committee.";
        } else {
          summary = "Leadership level performance. Your profile indicates high literacy and active engagement. Focus on institutional policy-making and systemic advocacy.";
          trajectory = "Institutional representative at the UN High-Level Political Forum (HLPF).";
        }

        return { summary, actions: actions.slice(0, 4), trajectory };
      };

      // --- UI COMPONENTS ---

      const Navigation = ({ view, setView, role, logout }) => (
        <nav className="sticky top-0 z-[100] w-full glass border-b border-slate-200/60 px-6 py-4">
          <div className="max-w-7xl mx-auto flex items-center justify-between">
            <div 
              className="flex items-center gap-3 cursor-pointer group" 
              onClick={() => setView('landing')}
            >
              <div className="w-10 h-10 sdg-gradient rounded-xl flex items-center justify-center text-white shadow-lg group-hover:rotate-6 transition-transform">
                <Globe size={22} />
              </div>
              <span className="text-xl font-black tracking-tighter text-slate-900 uppercase">SDG-INSIGHT</span>
            </div>
            
            <div className="hidden md:flex items-center gap-1">
              {[
                { id: 'landing', label: 'Overview', icon: <Home size={18} /> },
                { id: 'presentation', label: 'Framework', icon: <PresentationIcon size={18} /> },
                ...(role !== 'Guest' ? [{ id: 'dashboard', label: 'Analytics', icon: <LayoutDashboard size={18} /> }] : []),
                ...(role !== 'Guest' && role !== 'Admin' ? [{ id: 'assessment', label: 'Assessment', icon: <ClipboardCheck size={18} /> }] : [])
              ].map(item => (
                <button 
                  key={item.id}
                  onClick={() => setView(item.id)}
                  className={`flex items-center gap-2 px-5 py-2.5 rounded-xl font-bold text-sm transition-all ${view === item.id ? 'bg-emerald-50 text-emerald-700 shadow-sm' : 'text-slate-500 hover:text-slate-900 hover:bg-slate-50'}`}
                >
                  {item.icon} {item.label}
                </button>
              ))}
              
              {role !== 'Guest' ? (
                <button 
                  onClick={logout}
                  className="ml-4 px-5 py-2.5 rounded-xl text-rose-500 hover:bg-rose-50 font-black text-sm flex items-center gap-2 transition-all"
                >
                  <LogOut size={18} /> Exit
                </button>
              ) : (
                <button 
                  onClick={() => setView('auth')}
                  className="ml-4 px-6 py-2.5 bg-slate-900 text-white rounded-xl font-black text-sm hover:bg-black shadow-xl transition-all active:scale-95"
                >
                  Enter Portal
                </button>
              )}
            </div>
          </div>
        </nav>
      );

      const Landing = ({ onStart }) => (
        <section className="relative min-h-[90vh] flex flex-col items-center justify-center px-6 overflow-hidden bg-white">
          <div className="absolute top-0 left-1/2 -translate-x-1/2 w-full max-w-7xl h-full pointer-events-none opacity-30">
            <div className="absolute top-20 left-10 w-64 h-64 bg-emerald-200 rounded-full blur-[100px]"></div>
            <div className="absolute bottom-20 right-10 w-64 h-64 bg-blue-200 rounded-full blur-[100px]"></div>
          </div>

          <div className="max-w-4xl w-full text-center relative z-10 animate-slide-up">
            <div className="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-emerald-50 text-emerald-700 text-xs font-black uppercase tracking-widest mb-8 border border-emerald-100 shadow-sm">
              <Sparkles size={14} /> Shaping the Future of Higher Ed
            </div>
            <h1 className="text-6xl md:text-8xl font-[900] text-slate-900 tracking-tighter leading-[0.9] mb-10">
              Assessing <span className="text-transparent bg-clip-text sdg-gradient">Sustainability</span> Awareness.
            </h1>
            <p className="text-xl md:text-2xl text-slate-500 mb-12 font-medium leading-relaxed max-w-2xl mx-auto">
              A data-driven framework enabling Higher Education Institutions to quantify SDG engagement and institutional impact.
            </p>
            <div className="flex flex-col sm:flex-row items-center justify-center gap-6">
              <button 
                onClick={onStart}
                className="group relative px-10 py-5 bg-slate-900 text-white rounded-2xl font-black text-xl overflow-hidden transition-all hover:pr-14 hover:bg-emerald-600 shadow-2xl active:scale-95"
              >
                <span className="relative z-10">Start Institutional Journey</span>
                <ArrowRight className="absolute right-6 opacity-0 group-hover:opacity-100 transition-all transform translate-x-4 group-hover:translate-x-0" size={24} />
              </button>
              <button className="px-10 py-5 border-2 border-slate-100 text-slate-600 rounded-2xl font-black text-xl hover:bg-slate-50 transition-all flex items-center gap-3">
                <Info size={24} /> Methodology
              </button>
            </div>
          </div>
        </section>
      );

      const Auth = ({ onLogin }) => {
        const [role, setRole] = useState(null);
        const options = [
          { id: 'Student', icon: <GraduationCap size={40} />, label: 'Academic Student', desc: 'Assess personal SDG literacy and track progress.' },
          { id: 'Faculty', icon: <Briefcase size={40} />, label: 'Faculty Member', desc: 'Benchmark departmental data and curriculum alignment.' },
          { id: 'Admin', icon: <ShieldCheck size={40} />, label: 'Institutional Admin', desc: 'Analyze high-level metrics for strategic reporting.' }
        ];

        return (
          <div className="max-w-5xl mx-auto py-24 px-6 animate-slide-up">
            <div className="text-center mb-16">
              <h2 className="text-4xl font-black text-slate-900 mb-4 tracking-tight">Identity Portal</h2>
              <p className="text-slate-500 text-lg font-medium">Select your role to unlock customized SDG-INSIGHT tools.</p>
            </div>
            <div className="grid grid-cols-1 md:grid-cols-3 gap-8 mb-16">
              {options.map(opt => (
                <button 
                  key={opt.id}
                  onClick={() => setRole(opt.id)}
                  className={`relative p-10 rounded-[2.5rem] border-2 text-left transition-all duration-300 group ${role === opt.id ? 'border-emerald-600 bg-emerald-50/50 shadow-2xl scale-[1.02]' : 'border-slate-100 bg-white hover:border-emerald-200 hover:shadow-xl shadow-sm'}`}
                >
                  <div className={`w-20 h-20 rounded-2xl flex items-center justify-center mb-8 transition-colors ${role === opt.id ? 'bg-emerald-600 text-white shadow-emerald-200 shadow-xl' : 'bg-slate-50 text-slate-400 group-hover:bg-emerald-100 group-hover:text-emerald-600'}`}>
                    {opt.icon}
                  </div>
                  <h3 className="text-2xl font-black mb-3 text-slate-900">{opt.label}</h3>
                  <p className="text-slate-500 font-medium leading-relaxed">{opt.desc}</p>
                  {role === opt.id && (
                    <div className="absolute top-6 right-6 text-emerald-600">
                      <CheckCircle2 size={32} />
                    </div>
                  )}
                </button>
              ))}
            </div>
            <div className="flex justify-center">
              <button 
                disabled={!role}
                onClick={() => onLogin(role)}
                className={`px-24 py-5 rounded-2xl font-black text-xl shadow-2xl transition-all active:scale-95 ${role ? 'bg-emerald-600 text-white hover:bg-emerald-700' : 'bg-slate-200 text-slate-400 cursor-not-allowed'}`}
              >
                Access Framework
              </button>
            </div>
          </div>
        );
      };

      const Assessment = ({ onComplete }) => {
        const [step, setStep] = useState(0);
        const [dept, setDept] = useState(DEPARTMENTS[0]);
        const [answers, setAnswers] = useState({});

        const calculateScores = () => {
          let s = { knowledge: 0, attitude: 0, engagement: 0, exposure: 0, total: 0 };
          QUESTIONS.forEach(q => {
            const val = answers[q.id];
            if (!val) return;
            if (q.type === 'knowledge') {
              if (val === q.correctAnswer) s.knowledge += 25;
            } else if (q.type === 'attitude') {
              const idx = q.options.indexOf(val);
              s.attitude += (Math.max(0, 3 - idx) / 3) * 25;
            } else if (q.type === 'engagement') {
              if (val.includes('Frequently') || val.includes('Daily')) s.engagement += 25;
              else if (val.includes('Occasionally')) s.engagement += 12;
            } else if (q.type === 'exposure') {
              if (val.includes('Yes')) s.exposure += 25;
            }
          });
          s.total = Math.round(s.knowledge + s.attitude + s.engagement + s.exposure);
          onComplete(s, dept);
        };

        if (step === 0) return (
          <div className="max-w-2xl mx-auto py-24 px-6 animate-slide-up">
            <div className="bg-white p-12 rounded-[3rem] shadow-2xl border border-slate-100 text-center">
              <div className="w-20 h-20 bg-emerald-50 text-emerald-600 rounded-3xl flex items-center justify-center mx-auto mb-8 shadow-inner">
                <Settings size={40} />
              </div>
              <h2 className="text-4xl font-black text-slate-900 mb-6">Setup Context</h2>
              <p className="text-slate-500 mb-10 text-lg font-medium leading-relaxed">Your department choice helps us benchmark your data against institutional averages.</p>
              <div className="text-left mb-12">
                <label className="text-xs font-black text-slate-400 uppercase tracking-widest mb-3 block">Department Affiliation</label>
                <select 
                  value={dept} 
                  onChange={(e) => setDept(e.target.value)}
                  className="w-full p-6 rounded-2xl border-2 border-slate-100 bg-slate-50 text-lg font-black outline-none focus:border-emerald-500 transition-all appearance-none cursor-pointer"
                >
                  {DEPARTMENTS.map(d => <option key={d} value={d}>{d}</option>)}
                </select>
              </div>
              <button 
                onClick={() => setStep(1)}
                className="w-full py-5 sdg-gradient text-white rounded-2xl font-black text-xl shadow-xl hover:opacity-90 transition-all active:scale-95"
              >
                Begin Assessment
              </button>
            </div>
          </div>
        );

        const q = QUESTIONS[step - 1];
        const progress = (step / QUESTIONS.length) * 100;

        return (
          <div className="max-w-3xl mx-auto py-12 px-6 animate-slide-up">
            <div className="mb-12">
              <div className="flex justify-between items-end mb-4">
                <span className="px-3 py-1 bg-emerald-100 text-emerald-700 rounded-lg text-xs font-black uppercase tracking-widest">{q.type}</span>
                <span className="text-slate-400 font-bold text-sm">Question {step} of {QUESTIONS.length}</span>
              </div>
              <div className="w-full h-3 bg-slate-100 rounded-full overflow-hidden shadow-inner">
                <div 
                  className="h-full bg-emerald-500 transition-all duration-700 ease-out rounded-full" 
                  style={{ width: `${progress}%` }}
                ></div>
              </div>
            </div>

            <h3 className="text-3xl font-black text-slate-900 mb-10 leading-tight">{q.text}</h3>
            
            <div className="space-y-4">
              {q.options.map((opt, i) => (
                <button 
                  key={opt}
                  onClick={() => setAnswers({...answers, [q.id]: opt})}
                  className={`w-full p-6 rounded-[1.5rem] text-left border-2 transition-all flex items-center justify-between group ${answers[q.id] === opt ? 'border-emerald-500 bg-emerald-50/50 shadow-lg' : 'border-slate-100 bg-white hover:border-emerald-200'}`}
                >
                  <span className={`text-xl font-bold ${answers[q.id] === opt ? 'text-emerald-900' : 'text-slate-600'}`}>{opt}</span>
                  <div className={`w-8 h-8 rounded-full border-2 flex items-center justify-center transition-all ${answers[q.id] === opt ? 'bg-emerald-500 border-emerald-500 text-white' : 'border-slate-200 group-hover:border-emerald-300'}`}>
                    {answers[q.id] === opt && <CheckCircle size={18} />}
                  </div>
                </button>
              ))}
            </div>

            <div className="flex justify-between mt-16">
              <button 
                onClick={() => setStep(s => s - 1)}
                className={`px-8 py-4 text-slate-400 font-bold flex items-center gap-2 hover:text-slate-900 transition-all ${step === 1 ? 'opacity-0 pointer-events-none' : ''}`}
              >
                <ChevronLeft size={20} /> Back
              </button>
              {step < QUESTIONS.length ? (
                <button 
                  disabled={!answers[q.id]}
                  onClick={() => setStep(s => s + 1)}
                  className="px-12 py-4 bg-slate-900 text-white rounded-2xl font-black text-lg shadow-xl hover:bg-black transition-all disabled:opacity-30 flex items-center gap-2"
                >
                  Next <ChevronRight size={20} />
                </button>
              ) : (
                <button 
                  disabled={!answers[q.id]}
                  onClick={calculateScores}
                  className="px-16 py-4 bg-emerald-600 text-white rounded-2xl font-black text-lg shadow-xl hover:bg-emerald-700 transition-all flex items-center gap-2"
                >
                  See Results <Sparkles size={20} />
                </button>
              )}
            </div>
          </div>
        );
      };

      const Dashboard = ({ result, role }) => {
        const strategy = useMemo(() => result ? getStrategicRecommendations(result.scores, role) : null, [result, role]);
        
        const radarData = result ? [
          { subject: 'Knowledge', A: result.scores.knowledge, fullMark: 25 },
          { subject: 'Attitude', A: result.scores.attitude, fullMark: 25 },
          { subject: 'Engagement', A: result.scores.engagement, fullMark: 25 },
          { subject: 'Exposure', A: result.scores.exposure, fullMark: 25 },
        ] : [];

        const deptAverages = useMemo(() => DEPARTMENTS.map(d => ({
          name: d,
          score: Math.floor(Math.random() * 30) + 60,
        })).sort((a,b) => b.score - a.score), []);

        return (
          <div className="max-w-7xl mx-auto px-6 py-12 animate-slide-up">
            <header className="flex flex-col md:flex-row justify-between items-start md:items-end gap-8 mb-12">
              <div>
                <h1 className="text-4xl font-black text-slate-900 tracking-tight">Institutional Dashboard</h1>
                <p className="text-slate-500 font-bold mt-1 text-lg">Detailed Institutional Sustainability Index (ISI) Analytics</p>
              </div>
              <div className="flex gap-4">
                <button className="p-4 bg-white border border-slate-200 rounded-2xl text-slate-600 hover:bg-slate-50 shadow-sm transition-all"><Download size={22} /></button>
                <button className="p-4 bg-white border border-slate-200 rounded-2xl text-slate-600 hover:bg-slate-50 shadow-sm transition-all"><Share2 size={22} /></button>
              </div>
            </header>

            {result && role !== 'Admin' && (
              <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-12">
                <div className="bg-white p-10 rounded-[3rem] shadow-xl border border-slate-50 flex flex-col items-center justify-center text-center">
                  <h3 className="text-slate-400 uppercase tracking-widest text-xs font-black mb-10">ISI Assessment Result</h3>
                  <div className="relative">
                    <div className="text-9xl font-black text-slate-900 leading-none">{result.scores.total}</div>
                    <div className="absolute -top-4 -right-8 text-3xl font-black text-slate-200">/100</div>
                  </div>
                  <div className="mt-8 px-6 py-2 bg-emerald-100 text-emerald-800 rounded-full font-black text-sm tracking-wide">
                    {result.scores.total > 75 ? 'LEADERSHIP LEVEL' : result.scores.total > 50 ? 'DEVELOPING LEVEL' : 'EMERGENT LEVEL'}
                  </div>
                  <div className="h-72 w-full mt-12">
                    <ResponsiveContainer width="100%" height="100%">
                      <RadarChart cx="50%" cy="50%" outerRadius="80%" data={radarData}>
                        <PolarGrid stroke="#f1f5f9" />
                        <PolarAngleAxis dataKey="subject" tick={{ fill: '#94a3b8', fontSize: 11, fontWeight: '800' }} />
                        <Radar name="Score" dataKey="A" stroke="#10b981" fill="#10b981" fillOpacity={0.6} />
                      </RadarChart>
                    </ResponsiveContainer>
                  </div>
                </div>

                <div className="lg:col-span-2 bg-slate-900 p-12 rounded-[3.5rem] shadow-2xl text-white relative overflow-hidden flex flex-col justify-between">
                  <div className="relative z-10">
                    <div className="flex items-center gap-4 mb-12">
                      <div className="w-16 h-16 bg-emerald-500/20 rounded-[1.5rem] flex items-center justify-center text-emerald-400">
                        <Rocket size={32} />
                      </div>
                      <h3 className="text-3xl font-black">Strategy Engine <span className="text-emerald-500 text-sm ml-2 font-mono">v4.2</span></h3>
                    </div>
                    
                    <div className="space-y-12">
                      <div>
                        <span className="text-emerald-500 text-xs font-black uppercase tracking-widest mb-4 block">Analytical Summary</span>
                        <p className="text-2xl font-medium text-slate-200 leading-relaxed italic">"{strategy.summary}"</p>
                      </div>
                      
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        {strategy.actions.map((act, i) => (
                          <div key={i} className="group p-6 bg-slate-800/50 border border-slate-700/50 rounded-2xl flex items-start gap-4 transition-all hover:bg-slate-800 hover:border-emerald-500/50">
                            <div className="w-10 h-10 rounded-xl bg-slate-700/50 flex items-center justify-center text-emerald-500 group-hover:scale-110 transition-transform">
                              <Target size={20} />
                            </div>
                            <span className="font-bold text-slate-100 text-lg leading-snug">{act}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                  
                  <div className="mt-16 pt-10 border-t border-slate-800/50 relative z-10">
                    <div className="flex flex-col md:flex-row md:items-center justify-between gap-6">
                      <div>
                        <span className="text-slate-500 text-xs font-black uppercase tracking-widest mb-2 block">Institutional Trajectory</span>
                        <p className="text-2xl font-black text-white">{strategy.trajectory}</p>
                      </div>
                      <button className="px-8 py-4 bg-emerald-600 hover:bg-emerald-700 rounded-xl font-black transition-all shadow-xl active:scale-95">Accept Pathway</button>
                    </div>
                  </div>
                  <div className="absolute top-0 right-0 w-96 h-96 bg-emerald-600 rounded-full blur-[140px] opacity-10 -mr-40 -mt-40"></div>
                </div>
              </div>
            )}

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
              <div className="bg-white p-10 rounded-[3rem] shadow-xl border border-slate-50">
                <div className="flex items-center justify-between mb-12">
                  <h3 className="text-2xl font-black text-slate-900">Departmental Indexing</h3>
                  <Users2 className="text-slate-300" size={32} />
                </div>
                <div className="h-80">
                  <ResponsiveContainer width="100%" height="100%">
                    <BarChart data={deptAverages} layout="vertical" margin={{ left: 20 }}>
                      <XAxis type="number" domain={[0, 100]} hide />
                      <YAxis dataKey="name" type="category" width={140} tick={{ fontSize: 11, fontWeight: '700', fill: '#64748b' }} axisLine={false} tickLine={false} />
                      <Tooltip 
                        cursor={{ fill: '#F8FAFC' }}
                        contentStyle={{ borderRadius: '16px', border: 'none', boxShadow: '0 10px 15px -3px rgba(0,0,0,0.1)' }}
                      />
                      <Bar dataKey="score" radius={[0, 12, 12, 0]} barSize={24}>
                        {deptAverages.map((entry, index) => (
                          <Cell key={`cell-${index}`} fill={index === 0 ? '#10b981' : '#3b82f6'} fillOpacity={1 - (index * 0.1)} />
                        ))}
                      </Bar>
                    </BarChart>
                  </ResponsiveContainer>
                </div>
              </div>
              
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-8">
                <div className="bg-emerald-50 p-10 rounded-[3rem] border border-emerald-100/50 flex flex-col justify-center items-center text-center">
                  <span className="text-xs font-black text-emerald-600 uppercase tracking-widest mb-6 block">Overall Global ISI</span>
                  <div className="text-7xl font-[900] text-emerald-900 leading-none">76.4</div>
                  <div className="mt-8 px-4 py-2 bg-emerald-500 text-white rounded-xl text-xs font-black tracking-tighter">
                    +4.8% FROM PREV QUARTER
                  </div>
                </div>
                <div className="bg-blue-50 p-10 rounded-[3rem] border border-blue-100/50 flex flex-col justify-center items-center text-center">
                  <span className="text-xs font-black text-blue-600 uppercase tracking-widest mb-6 block">Awareness Gap</span>
                  <div className="text-7xl font-[900] text-blue-900 leading-none">12%</div>
                  <p className="mt-8 text-blue-700/60 font-bold text-sm leading-tight">Lower than institutional target for 2025</p>
                </div>
              </div>
            </div>
          </div>
        );
      };

      const Presentation = () => {
        const [current, setCurrent] = useState(0);
        const slides = [
          {
            title: "The Framework",
            subtitle: "Digital Methodology for Higher Ed",
            content: "HEIs are the primary engines for sustainable development. SDG-INSIGHT provides a standardized metric to track awareness, sentiment, and action.",
            icon: <BookOpen size={56} className="text-emerald-600" />
          },
          {
            title: "Problem Space",
            content: "Currently, institutional sustainability is measured by operations (solar panels, waste). We measure the human element—the actual literacy of students and staff.",
            icon: <AlertCircle size={56} className="text-rose-500" />,
            points: ["Invisible Awareness Gaps", "Qualitative Reporting Bias", "Lack of Deterministic Action Plans"]
          },
          {
            title: "Core Pillars",
            content: "Our system evaluates institutional awareness across four distinct behavioral dimensions.",
            icon: <Layout size={56} className="text-blue-600" />,
            points: ["Knowledge (Pillar I)", "Attitude (Pillar II)", "Engagement (Pillar III)", "Exposure (Pillar IV)"]
          },
          {
            title: "Outcome Driven",
            content: "Data from the framework drives curriculum redesign, targeted campaigns, and global UN reporting.",
            icon: <CheckCircle size={56} className="text-emerald-500" />,
            points: ["Standardized Benchmark (ISI)", "Automated Strategic Recommendations", "Real-time Departmental Comparisons"]
          }
        ];

        return (
          <div className="max-w-5xl mx-auto py-24 px-6 animate-slide-up">
            <div className="bg-white rounded-[4rem] shadow-2xl border border-slate-100 overflow-hidden flex flex-col min-h-[600px]">
              <div className="flex h-3 w-full bg-slate-50">
                {slides.map((_, i) => (
                  <div key={i} className={`h-full flex-grow transition-all duration-700 ${i <= current ? 'sdg-gradient' : 'bg-transparent'}`}></div>
                ))}
              </div>
              
              <div className="flex-grow flex flex-col items-center justify-center text-center p-20">
                <div className="mb-12 p-10 bg-slate-50 rounded-full inline-block shadow-inner">
                  {slides[current].icon}
                </div>
                <h2 className="text-5xl font-black text-slate-900 mb-6">{slides[current].title}</h2>
                {slides[current].subtitle && <p className="text-2xl text-emerald-600 font-bold mb-10">{slides[current].subtitle}</p>}
                
                <div className="max-w-2xl mx-auto">
                  <p className="text-2xl text-slate-500 font-medium leading-relaxed mb-12">{slides[current].content}</p>
                  {slides[current].points && (
                    <div className="flex flex-wrap justify-center gap-4 text-left">
                      {slides[current].points.map((p, i) => (
                        <div key={i} className="flex items-center gap-3 px-6 py-4 bg-slate-50 rounded-2xl text-slate-700 font-bold border border-slate-100">
                          <CheckCircle2 className="text-emerald-500" size={20} /> {p}
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
              
              <div className="p-12 bg-slate-50/50 border-t border-slate-100 flex justify-between items-center">
                <div className="flex flex-col">
                  <span className="text-slate-400 text-xs font-black uppercase tracking-widest mb-1">Module Progress</span>
                  <span className="text-slate-900 font-black text-lg">0{current + 1} / 0{slides.length}</span>
                </div>
                <div className="flex gap-4">
                  <button 
                    disabled={current === 0}
                    onClick={() => setCurrent(p => p - 1)}
                    className="p-5 rounded-2xl border-2 border-slate-200 text-slate-400 hover:text-slate-900 hover:border-slate-900 transition-all disabled:opacity-30 active:scale-95"
                  >
                    <ChevronLeft size={32} />
                  </button>
                  <button 
                    onClick={() => current === slides.length - 1 ? setCurrent(0) : setCurrent(p => p + 1)}
                    className="px-12 py-5 bg-slate-900 text-white rounded-2xl font-black text-xl hover:bg-black shadow-xl transition-all active:scale-95 flex items-center gap-3"
                  >
                    {current === slides.length - 1 ? 'Restart' : 'Next Step'} <ChevronRight size={24} />
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      };

      // --- MAIN APP ---
      const App = () => {
        const [view, setView] = useState('landing');
        const [role, setRole] = useState('Guest');
        const [result, setResult] = useState(null);

        const handleLogin = (selectedRole) => {
          setRole(selectedRole);
          setView(selectedRole === 'Admin' ? 'dashboard' : 'assessment');
        };

        const handleAssessmentComplete = (scores, dept) => {
          setResult({ scores, dept });
          setView('dashboard');
        };

        const logout = () => {
          setRole('Guest');
          setResult(null);
          setView('landing');
        };

        return (
          <div className="min-h-screen flex flex-col bg-[#F8FAFC]">
            <Navigation view={view} setView={setView} role={role} logout={logout} />
            
            <main className="flex-grow">
              {view === 'landing' && <Landing onStart={() => setView('auth')} />}
              {view === 'auth' && <Auth onLogin={handleLogin} />}
              {view === 'assessment' && <Assessment onComplete={handleAssessmentComplete} />}
              {view === 'dashboard' && <Dashboard result={result} role={role} />}
              {view === 'presentation' && <Presentation />}
            </main>

            <footer className="bg-white border-t border-slate-200/60 py-20 px-6">
              <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-start md:items-center gap-12">
                <div className="flex flex-col gap-4">
                  <div className="flex items-center gap-3">
                    <div className="w-8 h-8 sdg-gradient rounded-lg flex items-center justify-center text-white font-black text-sm">S</div>
                    <span className="text-xl font-black tracking-tighter uppercase">SDG-INSIGHT</span>
                  </div>
                  <p className="text-slate-400 font-medium max-w-sm leading-relaxed">
                    A global digital infrastructure project helping universities meet the UN 2030 Agenda targets through data transparency.
                  </p>
                </div>
                
                <div className="grid grid-cols-2 sm:grid-cols-3 gap-16 text-sm font-black uppercase tracking-widest text-slate-400">
                  <div className="flex flex-col gap-4">
                    <span className="text-slate-900">Platform</span>
                    <a href="#" className="hover:text-emerald-600 transition-colors">Documentation</a>
                    <a href="#" className="hover:text-emerald-600 transition-colors">Framework</a>
                  </div>
                  <div className="flex flex-col gap-4">
                    <span className="text-slate-900">Resources</span>
                    <a href="#" className="hover:text-emerald-600 transition-colors">Privacy</a>
                    <a href="#" className="hover:text-emerald-600 transition-colors">Legal</a>
                  </div>
                </div>
              </div>
              <div className="max-w-7xl mx-auto mt-20 pt-10 border-t border-slate-100 flex flex-col sm:flex-row justify-between items-center gap-4 text-xs font-black text-slate-300 tracking-widest uppercase">
                <span>© 2024 SDG-INSIGHT FRAMEWORK V4.0</span>
                <span>PART OF THE INSTITUTIONAL DIGITAL REFORM INITIATIVE</span>
              </div>
            </footer>
          </div>
        );
      };

      const rootElement = document.getElementById('root');
      if (rootElement) {
        const root = createRoot(rootElement);
        root.render(<App />);
      }
    </script>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
